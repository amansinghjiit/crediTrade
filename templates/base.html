{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="display" content="standalone" />
    <meta name="orientation" content="portrait" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-title" content="CrediTrade" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CrediTrade" />
    <meta name="theme-color" content="#1a73e8" />
    <meta
      name="keywords"
      content="CrediTrade, credits, trading, platform, trade credits, credit trading platform, buying credits, selling credits, credit marketplace, credit exchange, asset-backed trading, receivables trading, invoice trading, trade finance, credit risk management, working capital solutions, liquidity management, financial instruments trading, debt trading, how to trade credits online, best platform for credit trading, secure credit trading marketplace, benefits of trading credits, risks of credit trading, trading credits for small businesses, increase working capital through credit trading, manage credit risk with CrediTrade, find buyers for trade credits, sell receivables on CrediTrade, how to value trade credits, online credit trading for [your target industry], alternative finance solutions, business finance, financial services, investment platform, asset management, supply chain finance, B2B marketplace, financial technology (FinTech), digital finance, online trading, alternative investments, credit card rewards, earn rewards with credit card, cashback credit card, credit card points, credit card benefits, rewards platform, maximize credit card rewards, best rewards credit cards, credit card offers, credit card incentives, earn money with credit cards, credit card loyalty programs, credit card affiliate programs, credit card rewards system" />
    <meta
      name="description"
      content="Trade credits securely with CrediTrade! Buy, sell, and manage your trade credits efficiently. Discover the best platform for credit exchange and finance solutions." />
    <meta name="author" content="Aman Singh" />

    <link rel="manifest" href="{% static 'manifest.json' %}" />
    <link
      rel="icon"
      href="{% static 'images/ddfavicon.png' %}"
      type="image/x-icon" />
    <link
      rel="apple-touch-startup-image"
      href="{% static 'images/logo.png' %}" />
    <link rel="apple-touch-icon" href="{% static 'images/ddicon.png' %}" />
    <title>{% block title %}{% endblock %}</title>

    <!-- CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="{% static 'css/styles.css' %}" />
  </head>

  <body hx-sync="this:replace">
    <!-- Header -->
    {% include "core/header.html" %}

    <!-- Main Content -->
    <main class="main" id="main-content" hx-history-elt>{% block content %}{% endblock %}</main>

    <!-- JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <script src="{% static 'js/scripts.js' %}"></script>
    <script>
      // HTMX history: always re-fetch on back/forward so page CSS/partials stay correct
      htmx.config.historyCacheSize = 0;
      htmx.config.refreshOnHistoryMiss = true;

      function getCookie(name) {
        const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()[\]\\/+^])/g, '\\$1') + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : null;
      }

      function finishHtmxLoading() {
        NProgress.done();
        document.getElementById('main-content')?.classList.remove('loading');
      }

      // HTMX: CSRF for non-form requests (form token, then cookie fallback)
      document.body.addEventListener('htmx:configRequest', (e) => {
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]');
        const token = (csrfToken && csrfToken.value) || getCookie('csrftoken');
        if (token) {
          e.detail.headers['X-CSRFToken'] = token;
        }
      });

      // Close Bootstrap modals / backdrops before content swap (prevents UI break)
      function cleanupModals() {
        document.querySelectorAll('.modal.show').forEach((modalEl) => {
          const instance = bootstrap.Modal.getInstance(modalEl);
          if (instance) instance.hide();
        });
        document.querySelectorAll('.modal-backdrop').forEach((el) => el.remove());
        document.body.classList.remove('modal-open');
        document.body.style.removeProperty('overflow');
        document.body.style.removeProperty('padding-right');
      }

      document.body.addEventListener('htmx:beforeRequest', (e) => {
        const target = e.detail.target;
        const isMainNav = target && target.id === 'main-content';
        if (isMainNav) {
          cleanupModals();
          document.getElementById('main-content')?.classList.add('loading');
        }
        NProgress.start();
      });

      document.body.addEventListener('htmx:afterRequest', () => {
        finishHtmxLoading();
      });

      document.body.addEventListener('htmx:xhr:abort', () => {
        finishHtmxLoading();
      });

      document.body.addEventListener('htmx:responseError', () => {
        finishHtmxLoading();
        if (typeof toastr !== 'undefined') toastr.error('Request failed. Please try again.');
      });

      document.body.addEventListener('htmx:sendError', () => {
        finishHtmxLoading();
        if (typeof toastr !== 'undefined') toastr.error('Network error. Check your connection.');
      });

      // HTMX: close mobile menu, update active nav + title
      document.body.addEventListener('htmx:afterSettle', () => {
        document.getElementById('nav-menu')?.classList.remove('show-menu');
        document.querySelectorAll('.dropdown-menu.show').forEach((menu) => {
          menu.classList.remove('show');
        });
        window.scrollTo(0, 0);

        const path = window.location.pathname;
        document.querySelectorAll('.nav__item').forEach((item) => {
          const link = item.querySelector(':scope > a.nav__link[href]');
          if (!link) return;
          const href = link.getAttribute('href');
          if (href === '#') return;
          item.classList.toggle('active', href === path);
        });
        document.querySelectorAll('.bottom-nav-item').forEach((item) => {
          item.classList.toggle('active', item.getAttribute('href') === path);
        });

        const titles = {
          '/': 'CrediTrade',
          '/profile/': 'Profile',
          '/orders/dashboard/': 'Dashboard',
          '/orders/delivered/': 'Delivered Orders',
          '/orders/delivery-form/': 'Delivery Details',
          '/orders/pending/': 'Pending Orders',
          '/orders/trackmatch/': 'TrackMatch',
          '/analytics/email-broadcast/': 'Email Broadcast',
          '/analytics/order-insights/': 'Order Insights',
          '/analytics/ledger/': 'Ledger',
          '/orders/payments-dashboard/': 'Payments Dashboard',
        };
        if (path.startsWith('/orders/pending/edit/')) {
          document.title = 'Delivery Details';
        } else if (titles[path]) {
          document.title = titles[path];
        }

        if (path.startsWith('/analytics/order-insights') && typeof window.initOrderInsights === 'function') {
          window.initOrderInsights();
        }
        if (path.startsWith('/analytics/ledger') && typeof window.initLedger === 'function') {
          window.initLedger();
        }
        if ((path === '/' || path === '') && typeof window.initHome === 'function') {
          window.initHome();
        }
        if (path.startsWith('/orders/payments-dashboard') && typeof window.initPaymentsDashboard === 'function') {
          window.initPaymentsDashboard();
        }
      });

      document.body.addEventListener('htmx:historyRestore', () => {
        cleanupModals();
        window.scrollTo(0, 0);
      });

      // HTMX toast trigger (e.g. profile save)
      document.body.addEventListener('showToast', (e) => {
        const { message, type } = e.detail || {};
        if (message && toastr[type]) {
          toastr[type](message);
        }
      });

      $(document).ready(() => {
        toastr.options = {
          positionClass: "toast-bottom-center",
          timeOut: 2000
        };

        {% if messages %}
          {% for message in messages %}
            toastr.{{ message.tags }}('{{ message|escapejs }}');
          {% endfor %}
        {% endif %}
      });

      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/static/serviceworker.js')
            .then(reg => {
              reg.update();
              setInterval(() => reg.update(), 24 * 60 * 60 * 1000);
              navigator.serviceWorker.addEventListener('controllerchange', () => {
                window.location.reload();
              });
            })
            .catch(() => {});

          navigator.serviceWorker.addEventListener('message', event => {
            if (event.data && event.data.type === 'UPDATE_AVAILABLE') {
              window.location.reload();
            }
          });
        });
      }
    </script>
  </body>
</html>
