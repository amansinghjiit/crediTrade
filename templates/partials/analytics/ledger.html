{% load humanize %}
<style>
    .ledger-container {
        padding: 24px;
        height: 90vh;
        font-family: 'Inter', sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
        contain: paint;
    }

    .ledger-container .icon {
        font-size: 1rem;
        margin-right: 10px;
        color: #2563eb;
        background: linear-gradient(145deg, #2563eb, #1d4ed8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        display: inline-block;
        padding: 8px;
        border-radius: 50%;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .ledger-container .icon:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
    }

    .ledger-container .btn {
        background-color: rgba(51, 65, 85, 0.5);
        color: #e2e8f0;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        padding: 6px 12px;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .ledger-container .btn:hover {
        background-color: rgba(37, 99, 235, 0.7);
        border-color: rgba(37, 99, 235, 0.7);
    }

    .ledger-container .btn i {
        font-size: 16px;
    }

    .ledger-user,
    .ledger-date,
    .ledger-description {
        background-color: #1e293b;
        border: 1px solid #334155;
        color: #94a3b8;
        transition: border-color 0.3s, box-shadow 0.3s;
    }

    .ledger-date::placeholder {
        color: #94a3b8;
    }

    .ledger-user:focus,
    .ledger-date:focus,
    .ledger-description:focus {
        border-color: #2563eb;
        background-color: #1e293b !important;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
    }

    .ledger-container .summary-card {
        border-radius: 12px;
        background-color: rgba(51, 65, 85, 0.5);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        padding: 20px;
    }

    .ledger-container .summary-card h6 {
        font-size: 1rem;
        color: #94a3b8;
        font-weight: 500;
    }

    .ledger-container .summary-card h4 {
        font-size: 1.2rem;
        font-weight: 700;
        color: #e2e8f0;
    }

    .ledger-table {
        flex-grow: 1;
        border-radius: 12px;
        background: #1e293b;
        scrollbar-width: none;
        -ms-overflow-style: none;
    }

    .ledger-table::-webkit-scrollbar {
        display: none;
    }
    
    .ledger-table .table th,
    .ledger-table .table td {
        padding: 10px 16px;
        border-bottom: 1px solid #334155;
        white-space: nowrap;
        color: #e2e8f0;
    }

    .ledger-table .table thead th {
        background: #1e293b;
        padding: 14px;
        position: sticky;
        top: 0;
        z-index: 1;
    }

    .ledger-table  .table tbody td {
        background-color: rgba(51, 65, 85, 0.5);
    }

    @media (max-width: 767px) {
        .ledger-container {
            padding: 16px;
            height: auto;
        }
    
        .ledger-container .summary-card {
            padding: 16px;
        }
    
        .ledger-container h3 {
            font-size: 1.2rem;
        }
    
        .ledger-container .icon {
            font-size: 0.8rem;
            padding: 6px;
        }
    
        .ledger-container .btn {
            padding: 4px 8px;
            font-size: 12px;
        }
    
        .ledger-container .summary-card h6 {
            font-size: 0.9rem;
        }
    
        .ledger-container .summary-card h4 {
            font-size: 1rem;
        }

        .ledger-container .summary-card .closing-balance{
            display: none;
        }
    
        .ledger-table .table th,
        .ledger-table .table td {
            padding: 8px 12px;
            font-size: 0.9rem;
        }
    
        .ledger-table .table thead th {
            padding: 12px;
        }
        
        .ledger-user,
        .ledger-date,
        .ledger-description {
            font-size: 0.9rem;
        }
    }
</style>

<div class="ledger-container d-flex flex-column overflow-y-auto overflow-x-hidden">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="d-flex align-items-center fw-bold fs-4">
            <i class="fas fa-book icon" id="ledgerLogo"
               role="button"
               title="Reset filters"
               style="cursor: pointer;"
               hx-get="{% url 'ledger' %}"
               hx-target="#main-content"
               hx-swap="innerHTML"
               hx-push-url="true"></i> Ledger
        </h3>
        <a href="?export_pdf=True&date_range={{ selected_date_range }}&user={{ selected_user }}&description={{ selected_description }}" class="btn btn-primary"><i class="fas fa-file-pdf"></i> Export</a>
    </div>

    <form method="GET"
          class="row g-3 mb-4"
          id="ledgerForm"
          hx-get="{% url 'ledger' %}"
          hx-target="#main-content"
          hx-swap="innerHTML"
          hx-push-url="true">
        <div class="col-md-4">
            <select name="user" id="user" class="ledger-user form-select">
                <option value="all">All Users</option>
                {% for user in user_options %}
                <option value="{{ user }}" {% if selected_user == user %}selected{% endif %}>{{ user }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <input type="text" id="dateRange" name="date_range" class="ledger-date form-control" placeholder="Select date range" value="{{ selected_date_range|default:'' }}">
        </div>
        <div class="col-md-4">
            <select name="description" id="description" class="ledger-description form-select">
                <option value="all">All Transactions</option>
                {% for description in description_options %}
                <option value="{{ description }}" {% if selected_description == description %}selected{% endif %}>{{ description }}</option>
                {% endfor %}
            </select>
        </div>
    </form>

    <div class="card summary-card mb-4">
        <div class="d-flex justify-content-between text-center">
            <div>
                <h6>Opening Balance</h6>
                <h4>₹{{ opening_balance|intcomma }}</h4>
            </div>
            <div class="text-danger">
                <h6>Total Debit</h6>
                <h4>₹{{ total_debit|intcomma }}</h4>
            </div>
            <div class="text-success">
                <h6>Total Credit</h6>
                <h4>₹{{ total_credit|intcomma }}</h4>
            </div>
            <div class="closing-balance fw-bold">
                <h6>Closing Balance</h6>
                <h4>₹{{ closing_balance|intcomma }}</h4>
            </div>
        </div>
    </div>

    <div id="ledger-results">
{% include "partials/analytics/ledger_results.html" %}
    </div>
</div>
